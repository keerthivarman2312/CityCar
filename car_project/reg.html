<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Registration Form</title>
   <!-- box icons -->
   <link rel="stylesheet" href="https://unpkg.com/boxicons@latest/css/boxicons.min.css">
   <!-- remixicons -->
   <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />
   <!-- googlefonts -->
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link
       href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Stencil:opsz,wght@10..72,100..900&family=Lexend:wght@100..900&display=swap"
       rel="stylesheet"> 
  <style>
    body {
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
    display: flex;
    justify-content: center; 
    align-items: center; 
 
    background-image: url("./Images/reg2.jpg");
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
    height: 100vh;
    margin: 0;
    }
    :root {
    --h1-font: 4rem;
    --h2-font: 3.5rem;
    --p-font: 1.1rem;
    --bg-color: #ffffff;
    --text-color: #000000;
    --main-color: #ffee02;
    --other-color: #727272;
}
   header {
    position: fixed;
    width: 100%;
    top: 0;
    right: 0;
    z-index: 1000; 
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: transparent; 
    padding: 25px 10%;
    transition: all .7s ease;
    background-color: #000000;
    
}
a {
  text-decoration: none;
}

      .logo img {
    width: 150px;
    height: auto;
    padding-left: 250px;
    
} 




.navlinks a {
    display:inline-block;
    margin: 0 20px;
    font-size: var(--p-font);
    font-weight: 500;
    color: var(--bg-color);
    transition: all .7s ease;
   
}

.navlinks a:hover {
    color: var(--main-color);
    text-decoration: none;
}

.h-right {
    display: flex;
    align-items: center;
}

.h-btn {
    display: inline-block;
    font-size: 16px;
    padding: 18px 60px 15px 40px;
    font-weight: 700;
    color: var(--text-color);
    background: var(--main-color);
    border-radius: 20px 0;
    margin: 0 30px;
    transition: all .7s ease;
}

.h-btn:hover {
    border-radius: 0 20px 0 0;
    background: var(--bg-color);
}

.h-right i {
    font-size: 24px;
    color: var(--bg-color);
    cursor: pointer;
    transition: all .7s ease;
}

.h-right i:hover {
    transform: scale(1.1);
    color: var(--main-color);
}

#menu-icon {
    font-size: 40px;
    z-index: 10001;
    color: white;
    cursor: pointer;
    display: none;
}

    .headline{
        color: black;
    }

    .form-container {
      background-color:cornsilk;
      padding: 30px 40px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 450px;
      color: black;
      margin-top: 150px;
    }  
   
    table {
      width: 100%;
    }

    td {
      padding: 10px 0;
      vertical-align: top;
    }

    label {
      font-weight: bold;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .error {
      color: red;
      font-size: 0.85em;
    }

    button {
      width: 100%;
      background-color:rgb(175, 175, 14);
      color:black;
      padding: 12px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color :yellowgreen;
      color: white;
    }

    .login-link {
      text-align: center;
      margin-top: 15px;
    }

    .login-link a {
      color: green;
      text-decoration: none;
    }

     .login-link a:hover {
      text-decoration: none;
    } 
    
  </style>
</head>
<body>
    <header>
      <a href="index.html" class="logo">
        <img src="logo.png" alt="Logo">
      </a>
      
        </a>
        <ul class="navlinks">
            <a href="../index.html?#home">Home</a>
            <a href="../index.html?#about">About us</a>
            <a href="../index.html?#services">services</a>
            <a href="../index.html?#latestfeatures">latest features</a>
            <a href="../index.html?#contact">contact</a>
        </ul>
        <div class="h-right">
            <a href="#"><i class="ri-search-line"></i></a>
            <a href="/Login/login.html" class="h-btn">Book Now</a>
            <div class="bx bx-menu" id="menu-icon"></div>
        </div>
    </header>

  <div class="form-container">
    <h2 style="text-align: center;" class="headline">Registration Form</h2>
    <form id="registrationForm" onsubmit="return validateForm()">
      <table>
        <tr>
          <td><label for="firstName">First Name:</label></td>
          <td>
            <input type="text" id="firstName" name="firstName">
            <div class="error" id="firstNameError"></div>
          </td>
        </tr>
        <tr>
          <td><label for="lastName">Last Name:</label></td>
          <td>
            <input type="text" id="lastName" name="lastName">
            <div class="error" id="lastNameError"></div>
          </td>
        </tr>
        <tr>
          <td><label for="location">Location:</label></td>
          <td>
            <input type="text" id="location" name="location">
            <div class="error" id="locationError"></div>
          </td>
        </tr>
        <tr>
          <td><label for="mobile">Mobile Number:</label></td>
          <td>
            <input type="text" id="mobile" name="mobile">
            <div class="error" id="mobileError"></div>
          </td>
        </tr>
        <tr>
          <td><label for="email">Email:</label></td>
          <td>
            <input type="text" id="email" name="email">
            <div class="error" id="emailError"></div>
          </td>
        </tr>
        <tr>
          <td><label for="password">Password:</label></td>
          <td>
            <input type="password" id="password" name="password">
            <div class="error" id="passwordError"></div>
          </td>
        </tr>
        <tr>
          <td><label for="confirmPassword">Confirm Password:</label></td>
          <td>
            <input type="password" id="confirmPassword" name="confirmPassword">
            <div class="error" id="confirmPasswordError"></div>
          </td>
        </tr>
        <tr>
          <td colspan="2">
            <button type="submit">SUBMIT</button>
          </td>
        </tr>
      </table>
    </form>
    <div class="login-link">
      Already have an account? <a href="login.html">Login Here</a>
    </div>
  </div>

  <script>
    function validateForm() {
      let isValid = true;

      // Clear all error messages
      document.querySelectorAll(".error").forEach(e => e.textContent = "");

      const firstName = document.getElementById("firstName").value.trim();
      const lastName = document.getElementById("lastName").value.trim();
      const location = document.getElementById("location").value.trim();
      const mobile = document.getElementById("mobile").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      // Validate fields
      if (!firstName) {
        document.getElementById("firstNameError").textContent = "First name is required.";
        isValid = false;
      }

      if (!lastName) {
        document.getElementById("lastNameError").textContent = "Last name is required.";
        isValid = false;
      }

      if (!location) {
        document.getElementById("locationError").textContent = "Location is required.";
        isValid = false;
      }

      const mobileRegex = /^[0-9]{10}$/;
      if (!mobileRegex.test(mobile)) {
        document.getElementById("mobileError").textContent = "Enter a valid 10-digit mobile number.";
        isValid = false;
      }

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        document.getElementById("emailError").textContent = "Enter a valid email address.";
        isValid = false;
      }

      if (password.length < 6) {
        document.getElementById("passwordError").textContent = "Password must be at least 6 characters.";
        isValid = false;
      }

      if (password !== confirmPassword) {
        document.getElementById("confirmPasswordError").textContent = "Passwords do not match.";
        isValid = false;
      }

      return isValid;
    }
  </script>

</body>
</html>
